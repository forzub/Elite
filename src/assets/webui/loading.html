<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>EliteGame Loading</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 70% 25%, rgba(40, 140, 210, 0.18), transparent 34%),
        linear-gradient(180deg, #040913 0%, #00030a 100%);
      color: rgba(210, 235, 255, 0.92);
      font-family: Arial, sans-serif;
    }

    .screen {
      width: 100vw;
      height: 100vh;
      box-sizing: border-box;
      padding: 56px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .title {
      font-size: 30px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .hint {
      max-width: 760px;
      color: rgba(170, 210, 235, 0.58);
      line-height: 1.5;
      margin-bottom: 30px;
    }

    .barOuter {
      width: min(620px, 70vw);
      height: 12px;
      border: 1px solid rgba(120, 220, 255, 0.46);
      background: rgba(0, 0, 0, 0.55);
      overflow: hidden;
    }

    .barInner {
      height: 100%;
      width: 0%;
      background: rgba(110, 220, 255, 0.88);
      transition: width 0.18s ease;
    }

    .row {
      margin-top: 10px;
      width: min(620px, 70vw);
      display: flex;
      justify-content: space-between;
      color: rgba(170, 210, 235, 0.55);
      font-size: 12px;
      letter-spacing: 0.08em;
    }
  </style>
</head>

<body>
  <div class="screen">
    <div class="title">INITIALIZING FLIGHT SYSTEMS</div>

    <div class="hint" id="hint">
      Warming up reactor control. Loading telemetry. Aligning local frame.
    </div>

    <div class="barOuter">
      <div id="bar" class="barInner"></div>
    </div>

    <div class="row">
      <span id="stage">BOOT</span>
      <span id="percent">0%</span>
    </div>
  </div>

  <script>
    function setLoadingProgress(value, stage) {
      const p = Math.max(0, Math.min(100, Math.round(value * 100)));

      document.getElementById("bar").style.width = p + "%";
      document.getElementById("percent").textContent = p + "%";

      if (stage) {
        document.getElementById("stage").textContent = stage;
      }
    }

    setLoadingProgress(0.05, "BOOT");
  </script>
</body>
</html>
