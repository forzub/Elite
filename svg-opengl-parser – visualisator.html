<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Parser & Visualizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .content {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 25px;
            padding: 30px;
        }
        
        .input-section {
            grid-column: 1 / 4;
            background: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
            border: 2px dashed #667eea;
        }
        
        .output-section {
            background: white;
            padding: 25px;
            border-radius: 10px;
            border: 2px solid #e9ecef;
            display: flex;
            flex-direction: column;
        }
        
        .output-section.full-width {
            grid-column: 1 / 4;
        }
        
        .visualization-section {
            grid-column: 1 / 3;
            grid-row: 2 / 4;
        }
        
        h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        h2 svg {
            width: 24px;
            height: 24px;
        }
        
        textarea {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
            transition: border-color 0.3s;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        
        .normalization-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .visualization-controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .input-group {
            display: flex;
            flex-direction: column;
        }
        
        .input-group label {
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        
        .input-group input {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .range-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .range-group input {
            flex: 1;
        }
        
        .range-value {
            min-width: 40px;
            text-align: center;
            font-weight: 600;
            color: #667eea;
        }
        
        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }
        
        button {
            padding: 14px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .parse-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 2;
        }
        
        .parse-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .clear-btn {
            background: #6c757d;
            color: white;
            flex: 1;
        }
        
        .clear-btn:hover {
            background: #5a6268;
        }
        
        .output-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            flex: 1;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
            border: 1px solid #dee2e6;
            min-height: 250px;
        }
        
        .table-container {
            overflow-x: auto;
            margin-top: 10px;
            flex: 1;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
        
        th {
            background: #667eea;
            color: white;
            padding: 12px;
            text-align: left;
            position: sticky;
            top: 0;
        }
        
        td {
            padding: 10px 12px;
            border-bottom: 1px solid #dee2e6;
        }
        
        tr:nth-child(even) {
            background: #f8f9fa;
        }
        
        .visualization-container {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 20px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        .svg-canvas {
            flex: 1;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
            overflow: visible;
            min-height: 400px;
            position: relative;
        }
        
        #svgPreview {
            width: 100%;
            height: 100%;
        }
        
        .canvas-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e9ecef;
        }
        
        .zoom-info {
            font-weight: 600;
            color: #667eea;
        }
        
        .status {
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
            font-weight: 600;
            display: none;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .copy-btn {
            background: #28a745;
            color: white;
            padding: 10px 20px;
            margin-top: 15px;
            width: auto;
            align-self: flex-start;
        }
        
        .copy-btn:hover {
            background: #218838;
        }
        
        .stats {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 12px;
            color: #6c757d;
            margin-top: 5px;
        }
        
        @media (max-width: 1200px) {
            .content {
                grid-template-columns: 1fr 1fr;
            }
            
            .visualization-section {
                grid-column: 1 / 3;
                grid-row: auto;
            }
            
            .output-section.full-width {
                grid-column: 1 / 3;
            }
        }
        
        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }
            
            .input-section,
            .visualization-section,
            .output-section.full-width {
                grid-column: 1;
            }
            
            .controls {
                grid-template-columns: 1fr;
            }
            
            .normalization-inputs {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

    <script>
        let currentZoom = 1;
        let rawPoints = [];
        let normalizedPoints = [];
        let originalWinding = null;
        let finalWinding = "CCW";
        
        // Вычисление площади многоугольника (отрицательная = CW, положительная = CCW)
        function calculatePolygonArea(points) {
            let area = 0;
            const n = points.length;
            
            for (let i = 0; i < n; i++) {
                const j = (i + 1) % n;
                area += points[i][0] * points[j][1];
                area -= points[j][0] * points[i][1];
            }
            
            return area / 2;
        }
        
        // Определение направления (winding) многоугольника
        function getWindingDirection(points) {
            if (points.length < 3) return "неопределено";
            
            const area = calculatePolygonArea(points);
            return area > 0 ? "CCW" : "CW";
        }
        
        // Изменение направления на противоположное
        function reversePoints(points) {
            return [...points].reverse();
        }
        
        // Гарантировать направление CCW
        function ensureCCW(points) {
            if (points.length < 3) return points;
            
            const winding = getWindingDirection(points);
            originalWinding = winding;
            
            if (winding === "CW") {
                return reversePoints(points);
            }
            
            return points;
        }
        
        function parseSVGPath(pathData) {
            const points = [];
            const commands = pathData.trim().split(/\s+/);
            
            let i = 0;
            let currentX = 0, currentY = 0;
            
            while (i < commands.length) {
                const cmd = commands[i];
                
                if (cmd === 'M' || cmd === 'L') {
                    i++;
                    while (i < commands.length && !isNaN(parseFloat(commands[i]))) {
                        const x = parseFloat(commands[i]);
                        const y = parseFloat(commands[i + 1]);
                        points.push([x, y]);
                        currentX = x;
                        currentY = y;
                        i += 2;
                    }
                } else if (cmd === 'm' || cmd === 'l') {
                    i++;
                    while (i < commands.length && !isNaN(parseFloat(commands[i]))) {
                        const dx = parseFloat(commands[i]);
                        const dy = parseFloat(commands[i + 1]);
                        const x = currentX + dx;
                        const y = currentY + dy;
                        points.push([x, y]);
                        currentX = x;
                        currentY = y;
                        i += 2;
                    }
                } else if (cmd === 'H') {
                    i++;
                    while (i < commands.length && !isNaN(parseFloat(commands[i]))) {
                        const x = parseFloat(commands[i]);
                        points.push([x, currentY]);
                        currentX = x;
                        i++;
                    }
                } else if (cmd === 'h') {
                    i++;
                    while (i < commands.length && !isNaN(parseFloat(commands[i]))) {
                        const dx = parseFloat(commands[i]);
                        const x = currentX + dx;
                        points.push([x, currentY]);
                        currentX = x;
                        i++;
                    }
                } else if (cmd === 'V') {
                    i++;
                    while (i < commands.length && !isNaN(parseFloat(commands[i]))) {
                        const y = parseFloat(commands[i]);
                        points.push([currentX, y]);
                        currentY = y;
                        i++;
                    }
                } else if (cmd === 'v') {
                    i++;
                    while (i < commands.length && !isNaN(parseFloat(commands[i]))) {
                        const dy = parseFloat(commands[i]);
                        const y = currentY + dy;
                        points.push([currentX, y]);
                        currentY = y;
                        i++;
                    }
                } else if (cmd === 'Z' || cmd === 'z') {
                    if (points.length > 0) {
                        points.push([points[0][0], points[0][1]]);
                    }
                    i++;
                } else if (!isNaN(parseFloat(cmd))) {
                    const x = parseFloat(commands[i]);
                    const y = parseFloat(commands[i + 1]);
                    points.push([x, y]);
                    currentX = x;
                    currentY = y;
                    i += 2;
                } else {
                    i++;
                }
            }
            
            // Гарантируем CCW направление
            return ensureCCW(points);
        }
        
        function normalizePoints(points, width, height) {
            if (!width || !height || width <= 0 || height <= 0) {
                return points;
            }
            
            return points.map(point => [
                point[0] / width,
                point[1] / height
            ]);
        }
        
        function formatRawPoints(points) {
            if (points.length === 0) return '';
            let result = '// Направление: ' + (originalWinding || 'неопределено') + '\n';
            result += '{\n';
            points.forEach(point => {
                result += `    {${point[0].toFixed(2)}f, ${point[1].toFixed(2)}f},\n`;
            });
            result += '}';
            return result;
        }
        
        function formatNormalizedPoints(points) {
            if (points.length === 0) return '';
            let result = '// Направление: CCW (гарантировано)\n';
            result += '{\n';
            points.forEach(point => {
                result += `    {${point[0].toFixed(6)}f, ${point[1].toFixed(6)}f},\n`;
            });
            result += '}';
            return result;
        }
        
        function updateDesmosTable(points) {
            const tableBody = document.getElementById('desmosTableBody');
            tableBody.innerHTML = '';
            
            points.forEach((point, index) => {
                const row = document.createElement('tr');
                
                const xCell = document.createElement('td');
                xCell.textContent = point[0].toFixed(6);
                
                const yCell = document.createElement('td');
                yCell.textContent = point[1].toFixed(6);
                
                const indexCell = document.createElement('td');
                indexCell.textContent = index + 1;
                
                row.appendChild(xCell);
                row.appendChild(yCell);
                row.appendChild(indexCell);
                tableBody.appendChild(row);
            });
        }
        
        function visualizeSVG(points, normalized) {
            const svg = document.getElementById('svgPreview');
            svg.innerHTML = '';
            
            if (points.length === 0) return;
            
            // Находим границы для viewBox
            const xs = points.map(p => p[0]);
            const ys = points.map(p => p[1]);
            const minX = Math.min(...xs);
            const maxX = Math.max(...xs);
            const minY = Math.min(...ys);
            const maxY = Math.max(...ys);
            
            const width = maxX - minX;
            const height = maxY - minY;
            const padding = Math.max(width, height) * 0.1;
            
            // Устанавливаем viewBox
            svg.setAttribute('viewBox', 
                `${minX - padding} ${minY - padding} ${width + 2*padding} ${height + 2*padding}`);
            
            // Создаем путь
            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            let pathData = `M ${points[0][0]} ${points[0][1]}`;
            for (let i = 1; i < points.length; i++) {
                pathData += ` L ${points[i][0]} ${points[i][1]}`;
            }
            
            const strokeWidth = document.getElementById('strokeWidth').value;
            const pointSize = document.getElementById('pointSize').value;
            
            path.setAttribute('d', pathData);
            path.setAttribute('fill', 'none');
            path.setAttribute('stroke', '#667eea');
            path.setAttribute('stroke-width', strokeWidth);
            path.setAttribute('stroke-linecap', 'round');
            path.setAttribute('stroke-linejoin', 'round');
            
            svg.appendChild(path);
            
            // Добавляем стрелки для указания направления
            addDirectionArrows(svg, points);
            
            // Добавляем точки
            points.forEach((point, index) => {
                const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circle.setAttribute('cx', point[0]);
                circle.setAttribute('cy', point[1]);
                circle.setAttribute('r', pointSize);
                circle.setAttribute('fill', index === 0 ? '#28a745' : 
                                   index === points.length - 1 ? '#dc3545' : '#ffc107');
                circle.setAttribute('stroke', '#333');
                circle.setAttribute('stroke-width', '1');
                
                // Добавляем номер точки
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', point[0]);
                text.setAttribute('y', point[1] - pointSize - 5);
                text.setAttribute('text-anchor', 'middle');
                text.setAttribute('font-size', '24');
                text.setAttribute('font-weight', 'bold');
                text.setAttribute('fill', '#333');
                text.textContent = index + 1;
                
                svg.appendChild(circle);
                svg.appendChild(text);
            });
            
            // Добавляем ось координат
            addCoordinateAxes(svg, minX, maxX, minY, maxY, padding);
            
            // Обновляем статистику
            updateVisualizationStats(points, pathData);
        }
        
        function addDirectionArrows(svg, points) {
            if (points.length < 3) return;
            
            // Добавляем стрелки на каждую 5-ю точку (или меньше для коротких путей)
            const step = Math.max(1, Math.floor(points.length / 10));
            
            for (let i = 0; i < points.length - 1; i += step) {
                if (i + 1 >= points.length) break;
                
                const p1 = points[i];
                const p2 = points[i + 1];
                
                // Вычисляем середину отрезка
                const midX = (p1[0] + p2[0]) / 2;
                const midY = (p1[1] + p2[1]) / 2;
                
                // Вычисляем угол
                const dx = p2[0] - p1[0];
                const dy = p2[1] - p1[1];
                const angle = Math.atan2(dy, dx) * 180 / Math.PI;
                
                // Создаем маркер-стрелку
                const arrow = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                arrow.setAttribute('points', '0,0 -8,-4 -8,4');
                arrow.setAttribute('fill', '#dc3545');
                arrow.setAttribute('transform', 
                    `translate(${midX},${midY}) rotate(${angle})`);
                arrow.setAttribute('opacity', '0.7');
                
                svg.appendChild(arrow);
            }
        }
        
        function addCoordinateAxes(svg, minX, maxX, minY, maxY, padding) {
            // X ось
            const xAxis = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            xAxis.setAttribute('x1', minX - padding);
            xAxis.setAttribute('y1', 0);
            xAxis.setAttribute('x2', maxX + padding);
            xAxis.setAttribute('y2', 0);
            xAxis.setAttribute('stroke', '#6c757d');
            xAxis.setAttribute('stroke-width', '1');
            xAxis.setAttribute('stroke-dasharray', '5,5');
            svg.appendChild(xAxis);
            
            // Y ось
            const yAxis = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            yAxis.setAttribute('x1', 0);
            yAxis.setAttribute('y1', minY - padding);
            yAxis.setAttribute('x2', 0);
            yAxis.setAttribute('y2', maxY + padding);
            yAxis.setAttribute('stroke', '#6c757d');
            yAxis.setAttribute('stroke-width', '1');
            yAxis.setAttribute('stroke-dasharray', '5,5');
            svg.appendChild(yAxis);
            
            // Подписи осей
            const xLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            xLabel.setAttribute('x', maxX + padding - 50);
            xLabel.setAttribute('y', 20);
            xLabel.setAttribute('text-anchor', 'end');
            xLabel.setAttribute('font-size', '30');
            xLabel.setAttribute('fill', '#6c757d');
            xLabel.textContent = 'X';
            svg.appendChild(xLabel);
            
            const yLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            yLabel.setAttribute('x', -20);
            yLabel.setAttribute('y', minY - padding + 50);
            yLabel.setAttribute('text-anchor', 'end');
            yLabel.setAttribute('font-size', '30');
            yLabel.setAttribute('fill', '#6c757d');
            yLabel.textContent = 'Y';
            svg.appendChild(yLabel);
        }
        
        function updateVisualizationStats(points, pathData) {
            document.getElementById('pointCount').textContent = points.length;
            
            const xs = points.map(p => p[0]);
            const ys = points.map(p => p[1]);
            const width = Math.max(...xs) - Math.min(...xs);
            const height = Math.max(...ys) - Math.min(...ys);
            document.getElementById('boundingBox').textContent = 
                `${width.toFixed(1)}×${height.toFixed(1)}`;
            
            // Приблизительная длина пути
            let length = 0;
            for (let i = 1; i < points.length; i++) {
                const dx = points[i][0] - points[i-1][0];
                const dy = points[i][1] - points[i-1][1];
                length += Math.sqrt(dx*dx + dy*dy);
            }
            document.getElementById('pathLength').textContent = length.toFixed(1);
            
            // Информация о направлении
            document.getElementById('windingInfo').textContent = 
                originalWinding ? `${originalWinding} → CCW` : 'CCW';
        }
        
        function showStatus(message, isError = false) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${isError ? 'error' : 'success'}`;
            statusDiv.style.display = 'block';
            
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 5000);
        }
        
        function parseSVG() {
            try {
                const svgInput = document.getElementById('svgInput').value.trim();
                const width = parseFloat(document.getElementById('width').value);
                const height = parseFloat(document.getElementById('height').value);
                const strokeWidth = document.getElementById('strokeWidth').value;
                const pointSize = document.getElementById('pointSize').value;
                
                if (!svgInput) {
                    showStatus('❌ Введите SVG path!', true);
                    return;
                }
                
                if (!width || !height || width <= 0 || height <= 0) {
                    showStatus('❌ Укажите корректные размеры для нормализации!', true);
                    return;
                }
                
                // Парсим точки и гарантируем CCW
                rawPoints = parseSVGPath(svgInput);
                
                if (rawPoints.length === 0) {
                    showStatus('❌ Не удалось распарсить точки из SVG!', true);
                    return;
                }
                
                // Нормализуем точки
                normalizedPoints = normalizePoints(rawPoints, width, height);
                
                // Обновляем вывод
                document.getElementById('rawOutput').textContent = formatRawPoints(rawPoints);
                document.getElementById('normalizedOutput').textContent = formatNormalizedPoints(normalizedPoints);
                updateDesmosTable(normalizedPoints);
                
                // Визуализируем
                visualizeSVG(rawPoints);
                
                let directionMsg = '';
                if (originalWinding && originalWinding !== "неопределено") {
                    directionMsg = ` Направление: ${originalWinding} → CCW`;
                }
                
                showStatus(`✅ Успешно! Найдено ${rawPoints.length} точек.${directionMsg}`);
                
            } catch (error) {
                showStatus(`❌ Ошибка: ${error.message}`, true);
                console.error(error);
            }
        }
        
        function zoomIn() {
            currentZoom *= 1.2;
            updateZoom();
        }
        
        function zoomOut() {
            currentZoom /= 1.2;
            updateZoom();
        }
        
        function resetView() {
            currentZoom = 1;
            updateZoom();
            parseSVG(); // Перерисовываем с начальными параметрами
        }
        
        function updateZoom() {
            const svg = document.getElementById('svgPreview');
            const box = svg.getBBox();
            const centerX = box.x + box.width / 2;
            const centerY = box.y + box.height / 2;
            
            const newWidth = box.width / currentZoom;
            const newHeight = box.height / currentZoom;
            
            svg.setAttribute('viewBox', 
                `${centerX - newWidth/2} ${centerY - newHeight/2} ${newWidth} ${newHeight}`);
            
            document.getElementById('zoomInfo').textContent = 
                `Масштаб: ${(currentZoom * 100).toFixed(0)}%`;
        }
        
        function updateRangeValues() {
            document.getElementById('strokeWidthValue').textContent = 
                document.getElementById('strokeWidth').value;
            document.getElementById('pointSizeValue').textContent = 
                document.getElementById('pointSize').value;
            
            // Если есть точки, перерисовываем с новыми параметрами
            if (rawPoints.length > 0) {
                visualizeSVG(rawPoints);
            }
        }
        
        function copyToClipboard(elementId) {
            const text = document.getElementById(elementId).textContent;
            navigator.clipboard.writeText(text).then(() => {
                showStatus('📋 Скопировано в буфер обмена!');
            }).catch(err => {
                showStatus('❌ Ошибка копирования!', true);
            });
        }
        
        function copyTableToClipboard() {
            const table = document.getElementById('desmosTable');
            let text = 'X\tY\tIndex\n';
            
            const rows = table.querySelectorAll('tbody tr');
            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                if (cells.length >= 3) {
                    text += `${cells[0].textContent}\t${cells[1].textContent}\t${cells[2].textContent}\n`;
                }
            });
            
            navigator.clipboard.writeText(text).then(() => {
                showStatus('📋 Таблица скопирована в буфер обмена!');
            }).catch(err => {
                showStatus('❌ Ошибка копирования таблицы!', true);
            });
        }
        
        function clearAll() {
            document.getElementById('svgInput').value = '';
            document.getElementById('rawOutput').textContent = '';
            document.getElementById('normalizedOutput').textContent = '';
            document.getElementById('desmosTableBody').innerHTML = '';
            document.getElementById('svgPreview').innerHTML = '';
            document.getElementById('status').style.display = 'none';
            document.getElementById('pointCount').textContent = '0';
            document.getElementById('boundingBox').textContent = '0×0';
            document.getElementById('pathLength').textContent = '0';
            document.getElementById('windingInfo').textContent = 'CCW';
            rawPoints = [];
            normalizedPoints = [];
            originalWinding = null;
            showStatus('🧹 Все поля очищены!');
        }
        
        // Инициализация
        document.getElementById('strokeWidth').addEventListener('input', updateRangeValues);
        document.getElementById('pointSize').addEventListener('input', updateRangeValues);
        
        window.onload = function() {
            parseSVG();
            updateRangeValues();
        };
    </script>
</body>
