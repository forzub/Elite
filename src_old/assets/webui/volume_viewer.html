<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Volume Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0b0f14;
      color: #d7dde8;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    body {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 10px;
      padding: 10px;
    }

    .left, .right {
      background: #121821;
      border: 1px solid #2a3442;
      border-radius: 6px;
      overflow: hidden;
      min-height: 0;
    }

    .left {
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .right {
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .topbar {
      padding: 8px 10px;
      border-bottom: 1px solid #2a3442;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .canvas-wrap {
      flex: 1;
      min-height: 0;
      position: relative;
      background: #0d1117;
      overflow: hidden;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .css2d-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .section {
      padding: 10px;
      border-bottom: 1px solid #2a3442;
    }

    .section:last-child {
      border-bottom: none;
    }

    .title {
      font-weight: bold;
      margin-bottom: 8px;
      color: #9fd3ff;
      font-size: 14px;
    }

    .status {
      margin-left: auto;
      font-size: 12px;
      opacity: 0.75;
    }

    .attachments {
      overflow: visible;
      max-height: none;
    }

    .att-item {
      padding: 8px;
      border: 1px solid #2a3442;
      border-radius: 4px;
      margin-bottom: 6px;
      cursor: pointer;
      background: #161d27;
    }

        .module-tree {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 12px;
    }

    .module-node {
      border: 1px solid #2a3442;
      border-radius: 4px;
      background: #161d27;
      padding: 6px 8px;
    }

    .module-node-header {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .module-node-id {
      color: #dfe9f8;
      font-weight: bold;
    }

    .module-node-parent {
      color: #9aa7b8;
      opacity: 0.85;
    }

    .module-node-subsystem {
      color: #9fd3ff;
      opacity: 0.9;
    }

    .module-node-children {
      margin-top: 6px;
      margin-left: 18px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      border-left: 1px dashed #304055;
      padding-left: 10px;
    }

    .module-node-has-attachment {
      border-color: #4db3ff;
      background: #182434;
    }

    .module-attachment-badge {
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 999px;
      border: 1px solid #35506f;
      background: #1b2736;
      color: #d7dde8;
    }

    .att-item:hover {
      background: #1c2532;
    }

    .att-item.selected {
      border-color: #4db3ff;
      background: #1f2d3d;
    }

    .row {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
      align-items: center;
    }

    .row label {
      width: 88px;
      min-width: 88px;
      font-size: 12px;
      color: #9aa7b8;
    }

    .row input[type="number"],
    .row input[type="text"] {
      flex: 1;
      min-width: 0;
      padding: 4px 6px;
      background: #0f141c;
      color: #d7dde8;
      border: 1px solid #304055;
      border-radius: 4px;
    }

    .triple {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      flex: 1;
    }

    button {
      padding: 8px 10px;
      background: #1b2736;
      color: #d7dde8;
      border: 1px solid #35506f;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background: #223246;
    }

    .small {
      font-size: 12px;
      opacity: 0.82;
      line-height: 1.45;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 12px;
      max-height: 260px;
      overflow: auto;
      background: #0f141c;
      padding: 8px;
      border-radius: 4px;
      border: 1px solid #2a3442;
    }

    .hint {
      font-size: 12px;
      opacity: 0.75;
      line-height: 1.45;
    }

    .toolbar-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .dim-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-top: 8px;
    }

    .dim-box {
      background: #0f141c;
      border: 1px solid #2a3442;
      border-radius: 4px;
      padding: 6px;
      font-size: 12px;
    }

    .dim-box strong {
      color: #9fd3ff;
    }

    .label-3d {
      color: #dfe9f8;
      font-size: 12px;
      font-weight: bold;
      white-space: nowrap;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(8, 12, 18, 0.72);
      border: 1px solid rgba(120, 150, 190, 0.35);
      transform: translate(-50%, -50%);
      user-select: none;
    }

    .label-axis-x {
      color: #ff7777;
    }

    .label-axis-y {
      color: #77ff77;
    }

    .label-axis-z {
      color: #77aaff;
    }

    .label-forward {
      color: #44ffff;
    }

    .label-dim {
      color: #ffcc55;
    }
  </style>
</head>
<body>
  <div class="left">
    <div class="topbar">
      <strong>Volume Viewer</strong>

    <div class="toolbar-group">
        <button onclick="app.resetView()">Reset View</button>
        <button onclick="app.requestSnapshot()">Reload</button>
    </div>

      <label for="ship-type-select">Ship type</label>
      <select id="ship-type-select" onchange="app.selectShipType()">

      </select>

      <span class="status" id="status">offline</span>
    </div>

    <div class="canvas-wrap" id="canvas-wrap">
      <canvas id="scene"></canvas>
      <div id="labels-layer" class="css2d-layer"></div>
    </div>
  </div>

<div class="right">
  <div class="section">
    <div class="title">Display</div>

    <div class="row">
      <label><input id="show-mesh" type="checkbox" checked> Mesh</label>
    </div>

    <div class="row">
      <label><input id="show-primary-volumes" type="checkbox" checked> Primary volumes</label>
    </div>

    <div class="row">
      <label><input id="show-support-volumes" type="checkbox" checked> Support-link volumes</label>
    </div>

    <div class="row">
      <label><input id="show-seam-candidates" type="checkbox"> Seam candidates</label>
    </div>

    <div class="row">
      <label for="module-filter">Module</label>
      <select id="module-filter">
        <option value="__all__">All modules</option>
      </select>
    </div>

    <div class="row">
      <label><input id="isolate-selected-module-mesh" type="checkbox"> Show only selected module mesh</label>
    </div>
  </div>

  <div class="section">
    <div class="title">Info</div>
    <div class="small" id="shipInfo">No ship loaded</div>

    <div class="dim-grid">
      <div class="dim-box"><strong>X</strong><div id="dim-x">0</div></div>
      <div class="dim-box"><strong>Y</strong><div id="dim-y">0</div></div>
      <div class="dim-box"><strong>Z</strong><div id="dim-z">0</div></div>
    </div>
  </div>

  <div class="section">
    <div class="title">Legend</div>
    <div class="small">
      Mesh edges: light blue<br>
      Primary volumes: yellow<br>
      Support-link volumes: cyan<br>
      Seam candidates: magenta
    </div>
  </div>
</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    const state = {
      ws: null,
      scene: null,
      camera: null,
      renderer: null,
      labelRenderer: null,
      controls: null,

      raycaster: new THREE.Raycaster(),
      mouse: new THREE.Vector2(),

      rootLogicalGroup: new THREE.Group(),
      modelGroup: new THREE.Group(),
      attachmentGroup: new THREE.Group(),
      axisGroup: new THREE.Group(),
      helperGroup: new THREE.Group(),
      gridGroup: new THREE.Group(),
      primaryVolumeGroup: new THREE.Group(),
      supportVolumeGroup: new THREE.Group(),
      seamCandidateGroup: new THREE.Group(),

      ship: null,
      selectedAttachmentId: null,
      attachmentMeshes: new Map(),

      shipMaxDimension: 1,
      shipBoundsMin: new THREE.Vector3(),
      shipBoundsMax: new THREE.Vector3(),
      shipCenter: new THREE.Vector3(),
      shipRotation: { x: 0, y: 0, z: 0 },
      shipTypes: [],
      selectedShipTypeId: '',
    };

    function setStatus(text) {
      document.getElementById('status').textContent = text;
    }

    function rebuildShipTypeSelect() 
    {
      const sel = document.getElementById('ship-type-select');
      if (!sel) return;

      sel.innerHTML = '';

      for (const item of state.shipTypes || []) {
        const opt = document.createElement('option');
        opt.value = item.typeId;
        opt.textContent = item.displayName || item.typeId;
        if (item.typeId === state.selectedShipTypeId) {
          opt.selected = true;
        }
        sel.appendChild(opt);
      }
    }



    function rebuildModuleFilter() {
    const sel = document.getElementById('module-filter');
    if (!sel) return;

    const oldValue = sel.value || '__all__';
    sel.innerHTML = '';

    const allOpt = document.createElement('option');
    allOpt.value = '__all__';
    allOpt.textContent = 'All modules';
    sel.appendChild(allOpt);

    for (const mod of (state.ship?.modules || [])) {
        const opt = document.createElement('option');
        opt.value = mod.moduleId;
        opt.textContent = mod.moduleId;
        sel.appendChild(opt);
    }

    const values = new Set(
        Array.from(sel.options).map(o => o.value)
    );

    sel.value = values.has(oldValue) ? oldValue : '__all__';
    }






    function clearGroup(group) {
      while (group.children.length > 0) {
        const obj = group.children[0];
        group.remove(obj);

        if (obj.geometry) {
          obj.geometry.dispose?.();
        }

        if (obj.material) {
          if (Array.isArray(obj.material)) {
            obj.material.forEach(m => m.dispose?.());
          } else {
            obj.material.dispose?.();
          }
        }

        if (obj.children && obj.children.length > 0) {
          clearGroup(obj);
        }
      }
    }

    function initScene() {
      const canvas = document.getElementById('scene');
      const wrap = document.getElementById('canvas-wrap');
      const labelsLayer = document.getElementById('labels-layer');

      state.scene = new THREE.Scene();
      state.scene.background = new THREE.Color(0x0d1117);

      state.camera = new THREE.PerspectiveCamera(
        45,
        canvas.clientWidth / canvas.clientHeight,
        0.1,
        5000
      );
      state.camera.position.set(20, 12, 20);

      state.renderer = new THREE.WebGLRenderer({
        canvas,
        antialias: true
      });
      state.renderer.setSize(canvas.clientWidth, canvas.clientHeight);
      state.renderer.setPixelRatio(window.devicePixelRatio || 1);

      state.labelRenderer = new CSS2DRenderer();
      state.labelRenderer.setSize(wrap.clientWidth, wrap.clientHeight);
      state.labelRenderer.domElement.style.position = 'absolute';
      state.labelRenderer.domElement.style.top = '0';
      state.labelRenderer.domElement.style.left = '0';
      state.labelRenderer.domElement.style.pointerEvents = 'none';
      labelsLayer.appendChild(state.labelRenderer.domElement);

      state.controls = new OrbitControls(state.camera, state.renderer.domElement);
      state.controls.enableDamping = true;
      state.controls.dampingFactor = 0.08;

      const amb = new THREE.AmbientLight(0xffffff, 0.7);
      state.scene.add(amb);

      const dir = new THREE.DirectionalLight(0xffffff, 0.9);
      dir.position.set(2, 3, 2);
      state.scene.add(dir);

      state.rootLogicalGroup.add(state.modelGroup);
      state.rootLogicalGroup.add(state.axisGroup);
      state.rootLogicalGroup.add(state.helperGroup);
      state.rootLogicalGroup.add(state.primaryVolumeGroup);
      state.rootLogicalGroup.add(state.supportVolumeGroup);
      state.rootLogicalGroup.add(state.seamCandidateGroup);

      state.scene.add(state.gridGroup);
      state.scene.add(state.rootLogicalGroup);

      canvas.addEventListener('click', onCanvasClick);
      window.addEventListener('resize', onResize);

      animate();
    }

    function animate() {
      requestAnimationFrame(animate);

      if (state.controls) {
        state.controls.update();
      }

      if (state.renderer && state.scene && state.camera) {
        state.renderer.render(state.scene, state.camera);
      }

      if (state.labelRenderer && state.scene && state.camera) {
        state.labelRenderer.render(state.scene, state.camera);
      }
    }

    function onResize() {
      const canvas = document.getElementById('scene');
      const wrap = document.getElementById('canvas-wrap');

      if (!state.camera || !state.renderer || !state.labelRenderer) return;

      const w = canvas.clientWidth;
      const h = canvas.clientHeight;

      state.camera.aspect = w / h;
      state.camera.updateProjectionMatrix();
      state.renderer.setSize(w, h);
      state.labelRenderer.setSize(wrap.clientWidth, wrap.clientHeight);
    }

    function buildPartGeometry(part) {
      const vertices = part.vertices || [];
      const triangles = part.triangles || [];

      const pos = [];
      for (const v of vertices) {
        pos.push(v[0], v[1], v[2]);
      }

      const idx = [];
      for (const t of triangles) {
        idx.push(t[0], t[1], t[2]);
      }

      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
      geo.setIndex(idx);
      geo.computeVertexNormals();
      geo.computeBoundingBox();
      geo.computeBoundingSphere();
      return geo;
    }

    function makeLabel(text, className) {
      const div = document.createElement('div');
      div.className = `label-3d ${className || ''}`;
      div.textContent = text;
      return new CSS2DObject(div);
    }

    function addLabel(group, text, position, className) {
      const label = makeLabel(text, className);
      label.position.copy(position);
      group.add(label);
      return label;
    }

    function niceStep(rawStep) {
      if (rawStep <= 0) return 1;
      const pow = Math.pow(10, Math.floor(Math.log10(rawStep)));
      const n = rawStep / pow;

      if (n < 1.5) return 1 * pow;
      if (n < 3.5) return 2 * pow;
      if (n < 7.5) return 5 * pow;
      return 10 * pow;
    }

    function computeShipMetrics() {
      const box = new THREE.Box3().setFromObject(state.modelGroup);
      state.shipBoundsMin.copy(box.min);
      state.shipBoundsMax.copy(box.max);
      box.getCenter(state.shipCenter);

      const size = new THREE.Vector3();
      box.getSize(size);
      state.shipMaxDimension = Math.max(size.x, size.y, size.z, 1.0);

        const dimX = document.getElementById('dim-x');
        const dimY = document.getElementById('dim-y');
        const dimZ = document.getElementById('dim-z');

        if (dimX) dimX.textContent = size.x.toFixed(3);
        if (dimY) dimY.textContent = size.y.toFixed(3);
        if (dimZ) dimZ.textContent = size.z.toFixed(3);
    }

    function buildGridAndDimensions() {
      clearGroup(state.gridGroup);
      clearGroup(state.helperGroup);

      const sizeX = state.shipBoundsMax.x - state.shipBoundsMin.x;
      const sizeY = state.shipBoundsMax.y - state.shipBoundsMin.y;
      const sizeZ = state.shipBoundsMax.z - state.shipBoundsMin.z;

      const groundY = state.shipBoundsMin.y;
      const gridSpan = Math.max(sizeX, sizeZ) * 1.5;
      const step = niceStep(gridSpan / 12);
      const divisions = Math.max(2, Math.round(gridSpan / step));

      const grid = new THREE.GridHelper(gridSpan, divisions, 0x335577, 0x223344);
      grid.position.set(state.shipCenter.x, groundY, state.shipCenter.z);
      state.gridGroup.add(grid);

      const axisLen = state.shipMaxDimension * 0.45;
      const headLen = axisLen * 0.10;
      const headWid = axisLen * 0.05;
      const origin  = state.shipCenter.clone();

      // Ship logical axes
      state.helperGroup.add(new THREE.ArrowHelper(
        new THREE.Vector3(1, 0, 0), origin, axisLen, 0xff5555, headLen, headWid
      ));
      state.helperGroup.add(new THREE.ArrowHelper(
        new THREE.Vector3(0, 1, 0), origin, axisLen, 0x55ff55, headLen, headWid
      ));
      state.helperGroup.add(new THREE.ArrowHelper(
        new THREE.Vector3(0, 0, 1), origin, axisLen, 0x5599ff, headLen, headWid
      ));
      state.helperGroup.add(new THREE.ArrowHelper(
        new THREE.Vector3(0, 0, -1), origin, axisLen * 0.9, 0x44ffff, headLen, headWid
      ));

      addLabel(
        state.helperGroup,
        '+X',
        origin.clone().add(new THREE.Vector3(axisLen * 1.18, 0, 0)),
        'label-axis-x'
      );

      addLabel(
        state.helperGroup,
        '+Y',
        origin.clone().add(new THREE.Vector3(0, axisLen * 1.18, 0)),
        'label-axis-y'
      );

      addLabel(
        state.helperGroup,
        '+Z',
        origin.clone().add(new THREE.Vector3(0, 0, axisLen * 1.18)),
        'label-axis-z'
      );

      addLabel(
        state.helperGroup,
        'FORWARD (-Z)',
        origin.clone().add(new THREE.Vector3(0, 0, -axisLen * 1.12)),
        'label-forward'
      );

      const dimColor = 0xffcc55;
      const x1 = state.shipBoundsMin.x;
      const x2 = state.shipBoundsMax.x;
      const y1 = state.shipBoundsMin.y;
      const y2 = state.shipBoundsMax.y;
      const z1 = state.shipBoundsMin.z;
      const z2 = state.shipBoundsMax.z;

      const dimYOffset = groundY - state.shipMaxDimension * 0.14;
      const dimXOffset = x2 + state.shipMaxDimension * 0.12;

      function addDimLine(group, a, b, color = dimColor) {
        const geo = new THREE.BufferGeometry().setFromPoints([a, b]);
        const line = new THREE.Line(geo, new THREE.LineBasicMaterial({ color }));
        group.add(line);
      }

      // X size
      {
        const a = new THREE.Vector3(x1, dimYOffset, z1);
        const b = new THREE.Vector3(x2, dimYOffset, z1);
        addDimLine(state.gridGroup, a, b);

        addLabel(
          state.gridGroup,
          `X: ${sizeX.toFixed(3)}`,
          new THREE.Vector3((x1 + x2) * 0.5, dimYOffset, z1 - state.shipMaxDimension * 0.08),
          'label-dim'
        );
      }

      // Z size
      {
        const a = new THREE.Vector3(x1, dimYOffset, z1);
        const b = new THREE.Vector3(x1, dimYOffset, z2);
        addDimLine(state.gridGroup, a, b);

        addLabel(
          state.gridGroup,
          `Z: ${sizeZ.toFixed(3)}`,
          new THREE.Vector3(x1 - state.shipMaxDimension * 0.10, dimYOffset, (z1 + z2) * 0.5),
          'label-dim'
        );
      }

      // Y size
      {
        const a = new THREE.Vector3(dimXOffset, y1, z2);
        const b = new THREE.Vector3(dimXOffset, y2, z2);
        addDimLine(state.helperGroup, a, b);

        addLabel(
          state.helperGroup,
          `Y: ${sizeY.toFixed(3)}`,
          new THREE.Vector3(dimXOffset + state.shipMaxDimension * 0.06, (y1 + y2) * 0.5, z2),
          'label-dim'
        );
      }
    }

    function degToRad(v) {
      return THREE.MathUtils.degToRad(v || 0);
    }

    function eulerDegToQuaternion(rotationDeg) {
      return new THREE.Quaternion().setFromEuler(
        new THREE.Euler(
          degToRad(rotationDeg?.[0]),
          degToRad(rotationDeg?.[1]),
          degToRad(rotationDeg?.[2]),
          'XYZ'
        )
      );
    }

    function buildLocalMatrix(position, rotationDeg) {
      const m = new THREE.Matrix4();
      const q = eulerDegToQuaternion(rotationDeg || [0, 0, 0]);
      m.compose(
        new THREE.Vector3(position?.[0] || 0, position?.[1] || 0, position?.[2] || 0),
        q,
        new THREE.Vector3(1, 1, 1)
      );
      return m;
    }

    

   

    function decomposeMatrix(matrix) {
      const position = new THREE.Vector3();
      const quaternion = new THREE.Quaternion();
      const scale = new THREE.Vector3();
      matrix.decompose(position, quaternion, scale);
      return { position, quaternion, scale };
    }

        function buildDescriptorModuleMap() {
      const modules = new Map();
      const list = state.ship?.modules || [];

      for (const mod of list) {
        modules.set(mod.moduleId, {
          moduleId: mod.moduleId,
          parentModuleId: mod.parentModuleId || '',
          subsystemId: mod.subsystemId || '',
          moduleLocalPosition: mod.moduleLocalPosition || [0, 0, 0],
          moduleLocalRotationDeg: mod.moduleLocalRotationDeg || [0, 0, 0],
          meshPartIds: mod.meshPartIds || []
        });
      }

      return modules;
    }

    function buildModuleOwnLocalMatrix(moduleData) {
      return buildLocalMatrix(
        moduleData?.moduleLocalPosition || [0, 0, 0],
        moduleData?.moduleLocalRotationDeg || [0, 0, 0]
      );
    }

    function findMeshPartById(partId) {
      const meshParts = state.ship?.meshParts || [];
      const showMesh = document.getElementById('show-mesh')?.checked ?? true;
      for (const part of meshParts) {
        if (part.id === partId) return part;
      }
      return null;
    }

    function buildModuleHierarchicalMatrix(moduleId, moduleMap, guard = 0) {
      if (!moduleId) {
        return new THREE.Matrix4().identity();
      }

      if (guard > 256) {
        console.warn('[AttachmentEditor] hierarchy cycle suspected for module:', moduleId);
        return new THREE.Matrix4().identity();
      }

      const moduleData = moduleMap.get(moduleId);
      if (!moduleData) {
        return new THREE.Matrix4().identity();
      }

      const own = buildModuleOwnLocalMatrix(moduleData);

      if (!moduleData.parentModuleId) {
        return own;
      }

      const parent = buildModuleHierarchicalMatrix(
        moduleData.parentModuleId,
        moduleMap,
        guard + 1
      );

      return parent.clone().multiply(own);
    }

    function findParentMatrix(parentId) {
      const moduleMap = buildDescriptorModuleMap();

      // 1. parentId как moduleId
      if (moduleMap.has(parentId)) {
        return buildModuleHierarchicalMatrix(parentId, moduleMap);
      }

      // 2. parentId как meshPartId
      const part = findMeshPartById(parentId);
      if (part) {
        const moduleMatrix = buildModuleHierarchicalMatrix(part.moduleId, moduleMap);
        const partOffsetMatrix = buildLocalMatrix(part.localOffset || [0, 0, 0], [0, 0, 0]);
        return moduleMatrix.clone().multiply(partOffsetMatrix);
      }

      return new THREE.Matrix4().identity();
    }

    function createAttachmentMarker(size, selected) {
      const group = new THREE.Group();

      const bodyLen = size * 1.45;
      const bodyWid = size * 0.72;
      const bodyHei = size * 0.72;
      const noseLen = size * 0.90;

      const body = new THREE.Mesh(
        new THREE.BoxGeometry(bodyWid, bodyHei, bodyLen),
        new THREE.MeshPhongMaterial({
          color: selected ? 0xffaa44 : 0x44aaff
        })
      );
      body.position.set(0, 0, 0);
      group.add(body);

      const nose = new THREE.Mesh(
        new THREE.ConeGeometry(size * 0.34, noseLen, 10),
        new THREE.MeshPhongMaterial({
          color: selected ? 0xffdd88 : 0x99ddff
        })
      );
      nose.rotation.x = Math.PI / 2;
      nose.position.set(0, 0, -(bodyLen * 0.5 + noseLen * 0.5));
      group.add(nose);

      return group;
    }

    function buildCameraForwardMarker(worldPos, worldQuat, axisLength) {
      const g = new THREE.Group();

      const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(worldQuat).normalize();
      const headLen = axisLength * 0.28;
      const headWid = axisLength * 0.15;

      g.add(new THREE.ArrowHelper(
        dir,
        worldPos.clone(),
        axisLength * 1.25,
        0xffdd55,
        headLen,
        headWid
      ));

      return g;
    }

    function buildAxesAtWorld(worldPos, worldQuat, axisLength) {
      const g = new THREE.Group();

      const xDir = new THREE.Vector3(1, 0, 0).applyQuaternion(worldQuat).normalize();
      const yDir = new THREE.Vector3(0, 1, 0).applyQuaternion(worldQuat).normalize();
      const zDir = new THREE.Vector3(0, 0, 1).applyQuaternion(worldQuat).normalize();

      const headLength = axisLength * 0.22;
      const headWidth  = axisLength * 0.12;

      g.add(new THREE.ArrowHelper(xDir, worldPos.clone(), axisLength, 0xff5555, headLength, headWidth));
      g.add(new THREE.ArrowHelper(yDir, worldPos.clone(), axisLength, 0x55ff55, headLength, headWidth));
      g.add(new THREE.ArrowHelper(zDir, worldPos.clone(), axisLength, 0x5599ff, headLength, headWidth));

      return g;
    }

    








   

    

    function rebuildShip() {
      clearGroup(state.modelGroup);
      clearGroup(state.attachmentGroup);
      clearGroup(state.axisGroup);
      clearGroup(state.helperGroup);
      clearGroup(state.gridGroup);
      clearGroup(state.primaryVolumeGroup);
      clearGroup(state.supportVolumeGroup);
      clearGroup(state.seamCandidateGroup);
      state.attachmentMeshes.clear();

      if (!state.ship) return;
      const showMesh = document.getElementById('show-mesh')?.checked ?? true;

      const selectedModuleId = document.getElementById('module-filter')?.value || '__all__';
      const isolateSelectedModuleMesh =
        document.getElementById('isolate-selected-module-mesh')?.checked ?? false;


      const legacyBasis = state.ship.visualBasisRotationDeg || [0, 0, 0];
      document.getElementById('shipInfo').textContent =
        `${state.ship.displayName || state.ship.shipId} (${state.ship.shipId}) | logical basis editor | legacy visualBasisRotationDeg=${legacyBasis.join(', ')}`;

            const meshParts = state.ship.meshParts || [];
      const descriptorModules = state.ship.modules || [];

      // IMPORTANT:
      // The assembly payload is already converted to the logical ship basis:
      // +X right, +Y up, -Z forward.
      // So the editor must NOT apply visualBasisRotationDeg here.
      state.modelGroup.quaternion.identity();
      state.modelGroup.rotation.set(0, 0, 0);
      state.modelGroup.position.set(0, 0, 0);

      const moduleMap = buildDescriptorModuleMap();
      const moduleGroups = new Map();

      // 1) create all module groups
      for (const mod of descriptorModules) {
        const moduleGroup = new THREE.Group();
        moduleGroup.applyMatrix4(buildModuleOwnLocalMatrix(mod));
        moduleGroup.userData.moduleId = mod.moduleId;
        moduleGroups.set(mod.moduleId, moduleGroup);
      }

      // 2) build module hierarchy
      for (const mod of descriptorModules) {
        const group = moduleGroups.get(mod.moduleId);
        if (!group) continue;

        const parentId = mod.parentModuleId || '';
        if (parentId && moduleGroups.has(parentId)) {
          moduleGroups.get(parentId).add(group);
        } else {
          state.modelGroup.add(group);
        }
      }

      // 3) attach mesh parts to their owning module groups
      for (const part of meshParts) {
        
        if (isolateSelectedModuleMesh &&
            selectedModuleId !== '__all__' &&
            part.moduleId !== selectedModuleId) {
        continue;
}
        const moduleGroup = moduleGroups.get(part.moduleId);
        if (!moduleGroup) continue;

        const geo = buildPartGeometry(part);
        const partGroup = new THREE.Group();
        partGroup.position.set(
          part.localOffset?.[0] || 0,
          part.localOffset?.[1] || 0,
          part.localOffset?.[2] || 0
        );

        if (showMesh) {
        const mesh = new THREE.Mesh(
            geo,
            new THREE.MeshPhongMaterial({
            color: 0x77aadd,
            transparent: true,
            opacity: 0.22,
            side: THREE.DoubleSide
            })
        );
        partGroup.add(mesh);

        const edges = new THREE.LineSegments(
            new THREE.EdgesGeometry(geo),
            new THREE.LineBasicMaterial({ color: 0xaad8ff })
        );
        partGroup.add(edges);
        }

        partGroup.userData.partId = part.id;
        partGroup.userData.moduleId = part.moduleId;

        moduleGroup.add(partGroup);
      }

      computeShipMetrics();
      buildGridAndDimensions();


            const showPrimary = document.getElementById('show-primary-volumes')?.checked ?? true;
      const showSupport = document.getElementById('show-support-volumes')?.checked ?? true;
      const showSeams   = document.getElementById('show-seam-candidates')?.checked ?? true;

      if (showPrimary) {
        for (const v of (state.ship.primaryVolumes || [])) {
            if (selectedModuleId !== '__all__' && v.moduleId !== selectedModuleId) {
            continue;
            }

            addObbWire(
            state.primaryVolumeGroup,
            v.center,
            v.halfSize,
            v.orientation,
            0xffcc55
            );
        }
        }

      if (showSupport) {
        for (const v of (state.ship.supportVolumes || [])) {
            if (selectedModuleId !== '__all__' &&
                v.moduleId !== selectedModuleId &&
                v.supportModuleId !== selectedModuleId) {
            continue;
            }

            addObbWire(
            state.supportVolumeGroup,
            v.center,
            v.halfSize,
            v.orientation,
            0x00ffff
            );
        }
      }

      if (showSeams) {
        for (const v of (state.ship.seamCandidates || [])) {
            if (selectedModuleId !== '__all__' &&
                v.moduleId !== selectedModuleId &&
                v.neighborModuleId !== selectedModuleId) {
            // seam candidates могут не иметь moduleId, поэтому фильтр мягкий
            // и просто не режет то, у чего поля нет
            }

            addObbWire(
            state.seamCandidateGroup,
            v.center,
            v.halfSize,
            v.orientation,
            0xff00ff
            );
        }
    }

      app.resetView();


      
    }

    function updateShipRotation() {
      const roll  = parseFloat(document.getElementById('ship-roll').value)  || 0;
      const pitch = parseFloat(document.getElementById('ship-pitch').value) || 0;
      const yaw   = parseFloat(document.getElementById('ship-yaw').value)   || 0;

      state.shipRotation = { x: roll, y: pitch, z: yaw };

      const q = new THREE.Quaternion().setFromEuler(
        new THREE.Euler(
          THREE.MathUtils.degToRad(roll),
          THREE.MathUtils.degToRad(pitch),
          THREE.MathUtils.degToRad(yaw),
          'XYZ'
        )
      );

      state.rootLogicalGroup.quaternion.copy(q);
    }




    function addObbWire(group, center, halfSize, orientation, colorHex) {
  const hx = halfSize[0];
  const hy = halfSize[1];
  const hz = halfSize[2];

  const corners = [
    [-hx, -hy, -hz], [ hx, -hy, -hz], [ hx,  hy, -hz], [-hx,  hy, -hz],
    [-hx, -hy,  hz], [ hx, -hy,  hz], [ hx,  hy,  hz], [-hx,  hy,  hz],
  ];

  const indices = [
    [0,1],[1,2],[2,3],[3,0],
    [4,5],[5,6],[6,7],[7,4],
    [0,4],[1,5],[2,6],[3,7]
  ];

  const basisX = new THREE.Vector3(...orientation[0]);
  const basisY = new THREE.Vector3(...orientation[1]);
  const basisZ = new THREE.Vector3(...orientation[2]);
  const c = new THREE.Vector3(...center);

  const points = corners.map(v => {
    return c.clone()
      .add(basisX.clone().multiplyScalar(v[0]))
      .add(basisY.clone().multiplyScalar(v[1]))
      .add(basisZ.clone().multiplyScalar(v[2]));
  });

  const pos = [];
  for (const [a, b] of indices) {
    pos.push(points[a].x, points[a].y, points[a].z);
    pos.push(points[b].x, points[b].y, points[b].z);
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));

  const lines = new THREE.LineSegments(
    geo,
    new THREE.LineBasicMaterial({ color: colorHex })
  );

  group.add(lines);
}






    function connectWs() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      state.ws = new WebSocket(`${protocol}//${location.host}`);

      state.ws.addEventListener('open', () => {
        setStatus('connected');
        state.ws.send(JSON.stringify({
          type: 'subscribe',
          panel: 'volume_viewer',
          payload: {}
        }));
      });

      state.ws.addEventListener('close', () => setStatus('disconnected'));
      state.ws.addEventListener('error', () => setStatus('error'));

      state.ws.addEventListener('message', (event) => {
        const msg = JSON.parse(event.data);

        if (msg.type !== 'state_update') return;
        if (msg.panel !== 'volume_viewer') return;

        const payload = msg.payload || {};

        state.shipTypes = payload.shipTypes || [];
        state.selectedShipTypeId = payload.selectedShipTypeId || '';
        state.ship = payload.selectedShip || null;
        console.log('selectedShip payload:', state.ship);

        rebuildShipTypeSelect();
        rebuildModuleFilter();
        rebuildShip();
      });
    }

    window.app = {
  selectShipType() {
    const sel = document.getElementById('ship-type-select');
    if (!state.ws || !sel) return;

    state.ws.send(JSON.stringify({
      type: 'command',
      panel: 'volume_viewer',
      command: 'select_ship_type',
      payload: {
        shipTypeId: sel.value
      }
    }));
  },

  resetView() {
    const dist = Math.max(state.shipMaxDimension * 1.4, 12);
    state.camera.position.set(
      state.shipCenter.x + dist,
      state.shipCenter.y + dist * 0.55,
      state.shipCenter.z + dist
    );
    state.controls.target.copy(state.shipCenter);
    state.controls.update();
  },

  requestSnapshot() {
    if (!state.ws) return;
    state.ws.send(JSON.stringify({
      type: 'command',
      panel: 'volume_viewer',
      command: 'request_snapshot',
      payload: {}
    }));
  }
};

    document.addEventListener('DOMContentLoaded', () => {
      initScene();
      connectWs();
        [
            'show-mesh',
            'show-primary-volumes',
            'show-support-volumes',
            'show-seam-candidates',
            'module-filter',
            'isolate-selected-module-mesh'
            ].forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                el.addEventListener('change', () => rebuildShip());
            }
        });
    });
  </script>
