<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Debug Control</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: #0b0f14;
      color: #d7dde8;
      font-family: Arial, sans-serif;
    }
    body {
      padding: 12px;
    }
    .topbar {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }
    .status {
      margin-left: auto;
      opacity: 0.8;
      font-size: 12px;
    }
    .section {
      background: #121821;
      border: 1px solid #2a3442;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .title {
      font-weight: bold;
      margin-bottom: 10px;
      color: #9fd3ff;
    }
    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .row label {
      min-width: 220px;
      font-size: 13px;
      color: #9aa7b8;
    }
    input[type="number"], input[type="text"] {
      padding: 4px 6px;
      background: #0f141c;
      color: #d7dde8;
      border: 1px solid #304055;
      border-radius: 4px;
      min-width: 100px;
    }
    input[type="checkbox"] {
      transform: scale(1.1);
    }
    button {
      padding: 8px 10px;
      background: #1b2736;
      color: #d7dde8;
      border: 1px solid #35506f;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #223246;
    }
    .triple {
      display: grid;
      grid-template-columns: repeat(4, 90px);
      gap: 6px;
      align-items: center;
    }
    .small {
      font-size: 12px;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <strong>Debug Control</strong>
    <button onclick="app.requestSnapshot()">Reload</button>
    <button onclick="app.apply()">Apply</button>
    <span class="status" id="status">offline</span>
  </div>

  <div class="section">
    <div class="title">Flags</div>

    <div class="row"><label>Draw meshes</label><input id="drawMeshes" type="checkbox"></div>
    <div class="row"><label>Draw axes (legacy)</label><input id="drawAxes" type="checkbox"></div>
    <div class="row"><label>Draw world axes</label><input id="drawWorldAxes" type="checkbox"></div>
    <div class="row"><label>Draw object axes</label><input id="drawObjectAxes" type="checkbox"></div>
    <div class="row"><label>Draw module pivots</label><input id="drawModulePivots" type="checkbox"></div>
    <div class="row"><label>Draw hit volumes</label><input id="drawHitVolumes" type="checkbox"></div>

    <div class="row">
      <label>Hit volume filter</label>
      <select id="hitVolumeFilterMode">
        <option value="0">All hit volumes</option>
        <option value="1">Primary only</option>
        <option value="2">Support-link only</option>
      </select>
    </div>

    <div class="row"><label>Publish object orientation</label><input id="publishObjectOrientation" type="checkbox"></div>
    <div class="row"><label>Hit volumes overlay</label><input id="hitVolumesOverlay" type="checkbox"></div>
    <div class="row"><label>Hide meshes when drawing hit volumes</label><input id="hideMeshesWhenDrawingHitVolumes" type="checkbox"></div>

    <div class="row"><label>Axes overlay</label><input id="axesOverlay" type="checkbox"></div>
    <div class="row"><label>Crosses overlay</label><input id="crossesOverlay" type="checkbox"></div>
    <div class="row"><label>Lines overlay</label><input id="linesOverlay" type="checkbox"></div>
  </div>

  <div class="section">
    <div class="title">Lengths</div>

    <div class="row"><label>World axis length</label><input id="worldAxisLength" type="number" step="1"></div>
    <div class="row"><label>Ship axis length</label><input id="shipAxisLength" type="number" step="1"></div>
    <div class="row"><label>Object axis length</label><input id="objectAxisLength" type="number" step="1"></div>
    <div class="row"><label>Module axis length</label><input id="moduleAxisLength" type="number" step="1"></div>
    <div class="row"><label>Module cross size</label><input id="moduleCrossSize" type="number" step="0.1"></div>
    <div class="row"><label>Rotation axis length</label><input id="rotAxisLength" type="number" step="1"></div>
  </div>

  <div class="section">
    <div class="title">Colors (RGBA 0..1)</div>

    <div class="row">
      <label>Axis X color</label>
      <div class="triple">
        <input id="axisXColor-0" type="number" step="0.01">
        <input id="axisXColor-1" type="number" step="0.01">
        <input id="axisXColor-2" type="number" step="0.01">
        <input id="axisXColor-3" type="number" step="0.01">
      </div>
    </div>

    <div class="row">
      <label>Axis Y color</label>
      <div class="triple">
        <input id="axisYColor-0" type="number" step="0.01">
        <input id="axisYColor-1" type="number" step="0.01">
        <input id="axisYColor-2" type="number" step="0.01">
        <input id="axisYColor-3" type="number" step="0.01">
      </div>
    </div>

    <div class="row">
      <label>Axis Z color</label>
      <div class="triple">
        <input id="axisZColor-0" type="number" step="0.01">
        <input id="axisZColor-1" type="number" step="0.01">
        <input id="axisZColor-2" type="number" step="0.01">
        <input id="axisZColor-3" type="number" step="0.01">
      </div>
    </div>

    <div class="row">
      <label>Module origin color</label>
      <div class="triple">
        <input id="moduleOriginColor-0" type="number" step="0.01">
        <input id="moduleOriginColor-1" type="number" step="0.01">
        <input id="moduleOriginColor-2" type="number" step="0.01">
        <input id="moduleOriginColor-3" type="number" step="0.01">
      </div>
    </div>

    <div class="row">
      <label>Module pivot color</label>
      <div class="triple">
        <input id="modulePivotColor-0" type="number" step="0.01">
        <input id="modulePivotColor-1" type="number" step="0.01">
        <input id="modulePivotColor-2" type="number" step="0.01">
        <input id="modulePivotColor-3" type="number" step="0.01">
      </div>
    </div>

    <div class="row">
      <label>Rotation axis color</label>
      <div class="triple">
        <input id="rotationAxisColor-0" type="number" step="0.01">
        <input id="rotationAxisColor-1" type="number" step="0.01">
        <input id="rotationAxisColor-2" type="number" step="0.01">
        <input id="rotationAxisColor-3" type="number" step="0.01">
      </div>
    </div>
  </div>

  <div class="section small">
    Эта страница управляет debug-настройками движка в реальном времени.
  </div>

  <script>
    const state = { ws: null };

    function setStatus(text) {
      document.getElementById('status').textContent = text;
    }

    function getColor(prefix) {
      return [
        parseFloat(document.getElementById(prefix + '-0').value) || 0,
        parseFloat(document.getElementById(prefix + '-1').value) || 0,
        parseFloat(document.getElementById(prefix + '-2').value) || 0,
        parseFloat(document.getElementById(prefix + '-3').value) || 0
      ];
    }

    function setColor(prefix, arr) {
      const v = Array.isArray(arr) ? arr : [0,0,0,1];
      for (let i = 0; i < 4; i++) {
        document.getElementById(prefix + '-' + i).value = Number(v[i] ?? 0).toFixed(2);
      }
    }

    function applyPayload(p) {
      document.getElementById('drawMeshes').checked = !!p.drawMeshes;
      document.getElementById('drawAxes').checked = !!p.drawAxes;
      document.getElementById('drawWorldAxes').checked = !!p.drawWorldAxes;
      document.getElementById('drawObjectAxes').checked = !!p.drawObjectAxes;

      document.getElementById('drawModulePivots').checked = !!p.drawModulePivots;
      document.getElementById('drawHitVolumes').checked = !!p.drawHitVolumes;
      document.getElementById('hitVolumeFilterMode').value = String(p.hitVolumeFilterMode ?? 0);
      document.getElementById('publishObjectOrientation').checked = !!p.publishObjectOrientation;

      document.getElementById('hitVolumesOverlay').checked = !!p.hitVolumesOverlay;
      document.getElementById('hideMeshesWhenDrawingHitVolumes').checked = !!p.hideMeshesWhenDrawingHitVolumes;

      document.getElementById('axesOverlay').checked = !!p.axesOverlay;
      document.getElementById('crossesOverlay').checked = !!p.crossesOverlay;
      document.getElementById('linesOverlay').checked = !!p.linesOverlay;

      document.getElementById('worldAxisLength').value = p.worldAxisLength ?? 120;
      document.getElementById('shipAxisLength').value = p.shipAxisLength ?? 18;
      document.getElementById('objectAxisLength').value = p.objectAxisLength ?? 30;
      document.getElementById('moduleAxisLength').value = p.moduleAxisLength ?? 30;
      document.getElementById('moduleCrossSize').value = p.moduleCrossSize ?? 2;
      document.getElementById('rotAxisLength').value = p.rotAxisLength ?? 30;

      setColor('axisXColor', p.axisXColor);
      setColor('axisYColor', p.axisYColor);
      setColor('axisZColor', p.axisZColor);
      setColor('moduleOriginColor', p.moduleOriginColor);
      setColor('modulePivotColor', p.modulePivotColor);
      setColor('rotationAxisColor', p.rotationAxisColor);
    }

    function buildPayload() {
      return {
        drawMeshes: document.getElementById('drawMeshes').checked,
        drawAxes: document.getElementById('drawAxes').checked,
        drawWorldAxes: document.getElementById('drawWorldAxes').checked,
        drawObjectAxes: document.getElementById('drawObjectAxes').checked,

        drawModulePivots: document.getElementById('drawModulePivots').checked,
        drawHitVolumes: document.getElementById('drawHitVolumes').checked,
        hitVolumeFilterMode: parseInt(document.getElementById('hitVolumeFilterMode').value, 10) || 0,
        publishObjectOrientation: document.getElementById('publishObjectOrientation').checked,
        hitVolumesOverlay: document.getElementById('hitVolumesOverlay').checked,
        hideMeshesWhenDrawingHitVolumes: document.getElementById('hideMeshesWhenDrawingHitVolumes').checked,

        axesOverlay: document.getElementById('axesOverlay').checked,
        crossesOverlay: document.getElementById('crossesOverlay').checked,
        linesOverlay: document.getElementById('linesOverlay').checked,

        worldAxisLength: parseFloat(document.getElementById('worldAxisLength').value) || 120,
        shipAxisLength: parseFloat(document.getElementById('shipAxisLength').value) || 18,
        objectAxisLength: parseFloat(document.getElementById('objectAxisLength').value) || 30,
        moduleAxisLength: parseFloat(document.getElementById('moduleAxisLength').value) || 30,
        moduleCrossSize: parseFloat(document.getElementById('moduleCrossSize').value) || 2,
        rotAxisLength: parseFloat(document.getElementById('rotAxisLength').value) || 30,

        axisXColor: getColor('axisXColor'),
        axisYColor: getColor('axisYColor'),
        axisZColor: getColor('axisZColor'),
        moduleOriginColor: getColor('moduleOriginColor'),
        modulePivotColor: getColor('modulePivotColor'),
        rotationAxisColor: getColor('rotationAxisColor')
      };
    }

    function connectWs() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      state.ws = new WebSocket(`${protocol}//${location.host}`);

      state.ws.addEventListener('open', () => {
        setStatus('connected');
        state.ws.send(JSON.stringify({
          type: 'subscribe',
          panel: 'debug_control',
          payload: {}
        }));
      });

      state.ws.addEventListener('close', () => setStatus('disconnected'));
      state.ws.addEventListener('error', () => setStatus('error'));

      state.ws.addEventListener('message', (event) => {
        const msg = JSON.parse(event.data);

        if (msg.type !== 'state_update') return;
        if (msg.panel !== 'debug_control') return;

        applyPayload(msg.payload || {});
      });
    }

    window.app = {
      requestSnapshot() {
        if (!state.ws) return;
        state.ws.send(JSON.stringify({
          type: 'command',
          panel: 'debug_control',
          command: 'request_snapshot',
          payload: {}
        }));
      },

      apply() {
        if (!state.ws) return;
        state.ws.send(JSON.stringify({
          type: 'command',
          panel: 'debug_control',
          command: 'apply_settings',
          payload: buildPayload()
        }));
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      connectWs();
    });
  </script>
</body>
</html>
