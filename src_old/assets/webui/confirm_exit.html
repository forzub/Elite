<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Confirm Exit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: rgba(5, 8, 14, 0.96);
      color: #d7dde8;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .root {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h1 {
      margin-bottom: 30px;
      letter-spacing: 3px;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: min(420px, 70vw);
    }

    button {
      width: 100%;
      padding: 16px 22px;
      font-size: clamp(17px, 1.8vw, 24px);
      background: #111b2b;
      color: #eef3ff;
      border: 1px solid #32527c;
      cursor: pointer;
    }

    button:hover:enabled {
      background: #18263c;
    }

    button:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .status {
      position: fixed;
      right: 12px;
      bottom: 10px;
      opacity: 0.65;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="root">
    <h1 id="title">CONFIRM EXIT</h1>
    <div class="menu" id="menu"></div>
  </div>
  <div class="status" id="status">offline</div>

  <script>
    const titleEl = document.getElementById('title');
    const menuEl = document.getElementById('menu');
    const statusEl = document.getElementById('status');

    const ws = new WebSocket(`ws://${location.host}`);

    ws.addEventListener('open', () => {
      statusEl.textContent = 'connected';
      ws.send(JSON.stringify({
        type: 'subscribe',
        panel: 'confirm_exit',
        payload: {}
      }));
    });

    ws.addEventListener('close', () => {
      statusEl.textContent = 'disconnected';
    });

    ws.addEventListener('message', (ev) => {
      const msg = JSON.parse(ev.data);

      if (msg.type !== 'state_update') return;
      if (msg.panel !== 'confirm_exit') return;

      const data = msg.payload || {};
      titleEl.textContent = data.title || 'CONFIRM EXIT';

      menuEl.innerHTML = '';

      for (const item of (data.items || [])) {
        const btn = document.createElement('button');
        btn.textContent = item.label || item.id;
        btn.disabled = item.enabled === false;

        btn.onclick = () => {
          if (btn.disabled) return;

          ws.send(JSON.stringify({
            type: 'command',
            panel: 'confirm_exit',
            command: item.id,
            payload: {}
          }));
        };

        menuEl.appendChild(btn);
      }
    });
  </script>
</body>
</html>
